<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>DeepModel Insight</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    .app-shell {
      display: flex;
      height: 100%;
      position: relative;
    }
    .sidebar {
      width: 220px;
      background: #1f2933;
      color: #f9fafb;
      display: flex;
      flex-direction: column;
      padding-top: 12px;
      overflow: hidden;
      transition: width 0.2s ease;
    }
    .app-shell.collapsed .sidebar {
      width: 0;
      padding-top: 0;
      border-right: none;
    }
    .sidebar-logo {
      padding: 12px 16px 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 600;
      color: #e5e7eb;
    }
    .sidebar-logo-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: linear-gradient(135deg,#3b82f6,#6366f1);
    }
    .menu {
      flex: 1;
      padding-top: 8px;
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      font-size: 13px;
      color: #cbd5f5;
      cursor: pointer;
      transition: background 0.15s,color 0.15s;
    }
    .menu-item-icon {
      width: 18px;
      text-align: center;
      font-size: 16px;
    }
    .menu-item.active {
      background: #334155;
      color: #ffffff;
    }
    .menu-item:hover {
      background: #273549;
    }
    .content {
      flex: 1;
      background: #f8fafc;
      border-left: 1px solid #e2e8f0;
    }
    .content iframe {
      border: none;
      width: 100%;
      height: 100%;
    }
    .sidebar-toggle {
      position: absolute;
      top: 10px;
      left: 220px;
      z-index: 20;
      width: 18px;
      height: 40px;
      border: 1px solid #e2e8f0;
      border-left: none;
      background: #ffffff;
      border-radius: 0 8px 8px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-size: 12px;
      color: #64748b;
      box-shadow: 2px 0 6px rgba(15,23,42,0.12);
      transition: left 0.2s ease;
    }
    .app-shell.collapsed .sidebar-toggle {
      left: 0;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <button class="sidebar-toggle" id="sidebar-toggle" title="展开/折叠侧边菜单">«</button>
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon"></div>
        <span>DeepModel Insight</span>
      </div>
      <div class="menu">
        <div class="menu-item active" data-page="modern.html">
          <div class="menu-item-icon">📈</div>
          <span>字段影响分析</span>
        </div>
        <div class="menu-item" data-page="cross.html">
          <div class="menu-item-icon">🔁</div>
          <span>跨对象来源分析</span>
        </div>
      </div>
    </aside>
    <main class="content">
      <iframe id="main-frame" src="modern.html"></iframe>
    </main>
  </div>

  <script>
    const items = document.querySelectorAll('.menu-item');
    const frame = document.getElementById('main-frame');
    items.forEach(item => {
      item.addEventListener('click', () => {
        items.forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        const page = item.getAttribute('data-page');
        if (page && frame) {
          frame.src = page;
        }
      });
    });

    const shell = document.querySelector('.app-shell');
    const toggleBtn = document.getElementById('sidebar-toggle');
    let sidebarCollapsed = false;
    if (toggleBtn && shell) {
      toggleBtn.addEventListener('click', () => {
        sidebarCollapsed = !sidebarCollapsed;
        shell.classList.toggle('collapsed', sidebarCollapsed);
        toggleBtn.textContent = sidebarCollapsed ? '»' : '«';
      });
    }
  </script>
</body>
</html>

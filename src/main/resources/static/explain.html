<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>按对象分组的解释</title>
  <style>
    :root{
      --bg:#0b1220; --card:#0f172a; --muted:#94a3b8; --text:#e2e8f0; --accent:#38bdf8;
      --ok:#22c55e; --warn:#f59e0b; --danger:#ef4444; --chip:#1f2937; --line:#1e293b;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background:var(--bg); color:var(--text)}
    #toolbar{position:sticky; top:0; z-index:10; display:flex; gap:10px; align-items:center; padding:12px; background:rgba(2,6,23,.7); backdrop-filter:saturate(120%) blur(8px); border-bottom:1px solid #0b1220}
    #toolbar label{font-size:12px; color:var(--muted)}
    #toolbar input, #toolbar select{height:32px; padding:0 10px; border-radius:8px; border:1px solid #334155; background:#0b1220; color:var(--text)}
    #toolbar button{height:32px; padding:0 12px; border:none; border-radius:8px; background:linear-gradient(135deg,#0ea5e9,#38bdf8); color:#001018; font-weight:600; cursor:pointer}
    #toolbar button.ghost{background:#111827; color:#cbd5e1; border:1px solid #374151}
    #container{display:grid; grid-template-columns: 240px 1fr; gap:14px; padding:14px}
    #sidenav{position:sticky; top:70px; align-self:start; background:var(--card); border:1px solid #0b1220; border-radius:12px; padding:10px}
    #sidenav h3{margin:0 0 8px 0; font-size:12px; color:var(--muted)}
    #sidenav .item{padding:6px 8px; border-radius:8px; cursor:pointer; color:#cbd5e1}
    #sidenav .item:hover{background:#0b1220}
    #content{min-height:60vh}
    details.group{background:var(--card); border:1px solid #0b1220; border-radius:14px; margin-bottom:12px; overflow:hidden}
    details.group>summary{list-style:none; padding:12px 14px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; background:linear-gradient(180deg,#0b1220,transparent)}
    details.group>summary::-webkit-details-marker{display:none}
    .badge{font-size:12px; color:#93c5fd; background:#0b1220; border:1px solid #1e293b; padding:2px 8px; border-radius:999px}
    .field{padding:10px 14px 14px 14px; border-top:1px dashed #1e293b}
    .field .title{display:flex; align-items:center; gap:8px; font-weight:600}
    .chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:6px}
    .chip{font-size:12px; color:#cbd5e1; background:#0b1220; border:1px solid #1e293b; padding:2px 8px; border-radius:999px}
    .chip.ok{border-color:#064e3b; background:#052e24; color:#34d399}
    .chip.info{border-color:#0c4a6e; background:#082f49; color:#7dd3fc}
    .steps{margin-top:10px; padding-left:12px; border-left:2px solid #1e293b}
    .step{padding:8px 0; display:flex; gap:10px; align-items:flex-start}
    .step .dot{width:10px; height:10px; border-radius:50%; margin-top:6px}
    .step .dot.intra{background:#eb256a}
    .step .dot.writeBack{background:#16a34a}
    code{background:#0b1220; color:#e5e7eb; padding:2px 6px; border-radius:6px; border:1px solid #1f2937}
    .muted{color:var(--muted)}
    .actions{display:flex; gap:8px; margin-left:auto}
    .mini{height:26px; padding:0 10px; border-radius:8px; background:#0b1220; border:1px solid #1e293b; color:#cbd5e1; cursor:pointer}
    .highlight{color:#fbbf24}
    @media (max-width: 1080px){ #container{grid-template-columns: 1fr} #sidenav{position:relative; top:auto} }
  </style>
  <script>
    async function fetchExplain(o,f,d,r){
      const url = `/api/impact/explain?objectType=${encodeURIComponent(o)}&field=${encodeURIComponent(f)}&depth=${encodeURIComponent(d)}&relType=${encodeURIComponent(r)}`;
      const resp = await fetch(url);
      if(!resp.ok) throw new Error('请求失败');
      return await resp.json();
    }
    function esc(s){ return (s??'').toString().replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;' }[c])); }
    function mark(text, keyword){
      if(!text || !keyword) return esc(text);
      try{
        const re = new RegExp(`(${keyword.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$&')})`,'gi');
        return esc(text).replace(re,'<span class="highlight">$1</span>');
      }catch(_){ return esc(text); }
    }
    function stepLine(step, rootField){
      const src = esc(step.source);
      const dst = esc(step.target);
      const reason = mark(step.reason||'', rootField);
      return `<div class="step"><div class="dot ${step.type}"></div><div><div><code>${src}</code> — <b>${esc(step.type)}</b> → <code>${dst}</code></div><div class="muted" style="margin-top:4px">${reason}</div></div></div>`;
    }
    function toMarkdown(data){
      const lines = [];
      lines.push(`# 影响解释`);
      lines.push(`根：${data.rootObject}.${data.rootField}`);
      (data.groups||[]).forEach(g=>{
        lines.push(`\n## ${g.object}`);
        (g.fields||[]).forEach(fe=>{
          lines.push(`\n### ${fe.object}.${fe.field}`);
          (fe.steps||[]).forEach(st=>{
            lines.push(`- ${st.source} -- ${st.type} --> ${st.target} · ${st.reason||''}`);
          });
        });
      });
      return lines.join('\n');
    }
    async function copyText(text){
      try{ await navigator.clipboard.writeText(text); return true; }catch(_){ return false; }
    }
    function renderSidenav(groups){
      const nav = document.getElementById('sidenav');
      nav.innerHTML = '<h3>对象索引</h3>';
      (groups||[]).forEach(g=>{
        const div = document.createElement('div');
        div.className='item';
        div.textContent = g.object;
        div.onclick = ()=>{
          const target = document.getElementById('grp_'+g.object);
          if(target){ target.scrollIntoView({behavior:'smooth', block:'start'}); target.open = true; }
        };
        nav.appendChild(div);
      });
    }
    function renderContent(data){
      const ct = document.getElementById('content');
      ct.innerHTML = '';
      const header = document.createElement('div');
      header.className='muted';
      header.style.margin = '6px 2px 10px 2px';
      header.innerHTML = `根：<code>${esc(data.rootObject)}.${esc(data.rootField)}</code>`;
      ct.appendChild(header);
      (data.groups||[]).forEach(g=>{
        const det = document.createElement('details');
        det.className = 'group'; det.open = true; det.id = 'grp_'+g.object;
        const sum = document.createElement('summary');
        sum.innerHTML = `${esc(g.object)} <span class="badge">${(g.fields||[]).length} 字段</span>`;
        det.appendChild(sum);
        (g.fields||[]).forEach(fe=>{
          const box = document.createElement('div'); box.className='field';
          const title = document.createElement('div'); title.className='title';
          title.innerHTML = `<span>${esc(fe.object)}.<b>${esc(fe.field)}</b></span>`;
          const actions = document.createElement('div'); actions.className='actions';
          const copyBtn = document.createElement('button'); copyBtn.className='mini'; copyBtn.textContent='复制MD';
          copyBtn.onclick = ()=>copyText(['### '+fe.object+'.'+fe.field].concat((fe.steps||[]).map(st=>`- ${st.source} -- ${st.type} --> ${st.target} · ${st.reason||''}`)).join('\n'));
          actions.appendChild(copyBtn);
          title.appendChild(actions);
          const chips = document.createElement('div'); chips.className='chips';
          const stepChip = document.createElement('div'); stepChip.className='chip info'; stepChip.textContent = `路径步骤 ${fe.steps?fe.steps.length:0}`;
          chips.appendChild(stepChip);
          const relSet = new Set((fe.steps||[]).map(s=>s.type));
          relSet.forEach(t=>{ const c = document.createElement('div'); c.className='chip'; c.textContent = (t==='writeBack'?'回写':'触发'); chips.appendChild(c); });
          const steps = document.createElement('div'); steps.className='steps';
          steps.innerHTML = (fe.steps||[]).map(st=>stepLine(st, data.rootField)).join('');
          box.appendChild(title); box.appendChild(chips); box.appendChild(steps);
          det.appendChild(box);
        });
        ct.appendChild(det);
      });
      renderSidenav(data.groups||[]);
    }
    async function loadExplain(){
      const o=document.getElementById('obj').value.trim();
      const f=document.getElementById('fld').value.trim();
      const d=parseInt(document.getElementById('dep').value||'3',10);
      const r=parseInt(document.getElementById('rel').value||'0',10);
      const data = await fetchExplain(o,f,d,r);
      window.__lastExplain = data;
      renderContent(data);
    }
    function expandAll(val){ document.querySelectorAll('details.group').forEach(d=>{ d.open = val; }); }
    async function exportMarkdown(){
      const data = window.__lastExplain; if(!data) return;
      const md = toMarkdown(data);
      const blob = new Blob([md], {type:'text/markdown'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download='explain.md'; a.click(); URL.revokeObjectURL(url);
    }
    window.addEventListener('DOMContentLoaded', ()=>{
      document.getElementById('btn').onclick=loadExplain;
      document.getElementById('btnExpand').onclick=()=>expandAll(true);
      document.getElementById('btnCollapse').onclick=()=>expandAll(false);
      document.getElementById('btnExport').onclick=exportMarkdown;
      loadExplain();
    });
  </script>
  </head>
<body>
  <div id="toolbar">
    <label>对象</label>
    <input id="obj" value="ArReceiptItem"/>
    <label>字段</label>
    <input id="fld" value="originAmount"/>
    <label>深度</label>
    <input id="dep" type="number" value="3" min="1" max="6"/>
    <label>关系类型</label>
    <select id="rel">
      <option value="0" selected>全部</option>
      <option value="1">回写</option>
      <option value="2">触发</option>
    </select>
    <button id="btn">查询</button>
    <button id="btnExpand" class="ghost">展开全部</button>
    <button id="btnCollapse" class="ghost">折叠全部</button>
    <button id="btnExport" class="ghost">导出Markdown</button>
  </div>
  <div id="container">
    <div id="sidenav"></div>
    <div id="content"></div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单测试</title>
    <style>
        body { font-family: Arial; padding: 30px; }
        select { width: 300px; padding: 10px; font-size: 14px; }
        .info { margin: 20px 0; padding: 15px; background: #f0f0f0; border-radius: 5px; }
        button { padding: 10px 20px; margin: 10px 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>对象选择测试</h1>
    
    <div class="info">
        <strong>状态：</strong><span id="status">正在加载...</span><br>
        <strong>对象数量：</strong><span id="count">0</span>
    </div>
    
    <label>选择对象：</label><br>
    <select id="objectSelect" size="10">
        <option>加载中...</option>
    </select>
    
    <br><br>
    <button onclick="loadObjects()">重新加载</button>
    <button onclick="testAPI()">测试 API</button>
    
    <h3>选中的对象：</h3>
    <div id="selected" style="padding: 10px; background: #e7f3ff; border-radius: 5px;">
        未选择
    </div>
    
    <h3>原始数据：</h3>
    <pre id="rawData" style="background: #f5f5f5; padding: 10px; max-height: 300px; overflow: auto;"></pre>

    <script>
        const selectEl = document.getElementById('objectSelect');
        const statusEl = document.getElementById('status');
        const countEl = document.getElementById('count');
        const selectedEl = document.getElementById('selected');
        const rawDataEl = document.getElementById('rawData');
        
        async function loadObjects() {
            statusEl.textContent = '正在加载...';
            selectEl.innerHTML = '<option>加载中...</option>';
            
            try {
                console.log('开始请求 /api/projection/objects');
                const response = await fetch('/api/projection/objects');
                console.log('响应状态:', response.status, response.statusText);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const objects = await response.json();
                console.log('获取到的对象:', objects);
                
                // 更新状态
                statusEl.textContent = '✅ 加载成功';
                statusEl.style.color = 'green';
                countEl.textContent = objects.length;
                
                // 显示原始数据
                rawDataEl.textContent = JSON.stringify(objects, null, 2);
                
                // 填充下拉框
                selectEl.innerHTML = '';
                if (objects.length === 0) {
                    selectEl.innerHTML = '<option>没有数据</option>';
                } else {
                    objects.forEach(obj => {
                        const option = document.createElement('option');
                        option.value = obj;
                        option.textContent = obj;
                        selectEl.appendChild(option);
                    });
                }
                
            } catch (error) {
                console.error('加载失败:', error);
                statusEl.textContent = '❌ 加载失败: ' + error.message;
                statusEl.style.color = 'red';
                selectEl.innerHTML = '<option>加载失败</option>';
                rawDataEl.textContent = error.stack;
            }
        }
        
        async function testAPI() {
            const url = '/api/projection/objects';
            console.log('测试 API:', url);
            alert('测试 API: ' + url + '\n\n打开开发者工具(F12)查看 Console 和 Network 标签页');
            await loadObjects();
        }
        
        // 监听选择变化
        selectEl.addEventListener('change', (e) => {
            selectedEl.textContent = e.target.value || '未选择';
        });
        
        // 页面加载完成后自动执行
        window.addEventListener('load', () => {
            console.log('页面加载完成，开始请求数据...');
            loadObjects();
        });
    </script>
</body>
</html>
